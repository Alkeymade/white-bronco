<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE BRONCO | THE MACHINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-zinc-400 font-mono h-screen overflow-hidden flex items-center justify-center">

    <canvas id="neural-canvas"></canvas>

    <div class="relative z-10 text-center px-4 w-full max-w-2xl">
        <h1 class="text-xs tracking-[0.5em] uppercase mb-8 opacity-50">White Bronco</h1>
        
        <div id="status-msg" class="text-[10px] uppercase tracking-widest mb-4 opacity-0 transition-opacity duration-1000">
            Communing with the void...
        </div>

        <input type="text" id="prompt-input" 
               placeholder="Whisper your offering to the machine..." 
               class="bg-transparent border-b border-zinc-800 w-full py-4 text-center focus:outline-none focus:border-zinc-500 transition-colors placeholder:zinc-700 text-zinc-300">
    </div>

    <div id="artifact-overlay" class="fixed inset-0 bg-black z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-[2000ms] p-8">
        <div class="max-w-xl text-center">
            <p id="user-quote" class="text-xl md:text-2xl text-zinc-200 leading-relaxed italic"></p>
            <div class="mt-12 h-px w-24 bg-zinc-800 mx-auto"></div>
            <button onclick="window.location.reload()" class="mt-8 text-[10px] uppercase tracking-[0.3em] opacity-40 hover:opacity-100 transition-opacity">Return to the Abyss</button>
        </div>
    </div>

    <audio id="stem-tension" loop src="tension.mp3"></audio>
    <audio id="stem-stampede" src="stampede.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
